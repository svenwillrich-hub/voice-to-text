server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API requests to the whisper-api container.
    # Strips /api/ prefix before forwarding to the backend.
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://whisper-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Support large file uploads (match MAX_UPLOAD_MB)
        client_max_body_size 500m;

        # Long transcriptions may take a while on CPU
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Reverse-proxy text processing requests to the text-api container.
    location /text-api/ {
        rewrite ^/text-api/(.*) /$1 break;
        proxy_pass http://text-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        client_max_body_size 10m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
