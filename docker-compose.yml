###############################################################################
# Voice-to-Text — Docker Compose (Development / Local Testing)
#
# CPU-only:   docker compose up --build
# With GPU:   docker compose --profile gpu up --build
#
# For single-image deployment, use the root Dockerfile instead:
#   docker build -t voice-to-text .
###############################################################################

services:
  # ── Whisper API (FastAPI + faster-whisper) ──────────────────────────────
  whisper-api:
    build:
      context: ./whisper-api
      dockerfile: Dockerfile
    container_name: whisper-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-5}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-500}
    volumes:
      - model-cache:/root/.cache/huggingface

  # ── Whisper API — GPU variant (--profile gpu) ──────────────────────────
  whisper-api-gpu:
    build:
      context: ./whisper-api
      dockerfile: Dockerfile
    container_name: whisper-api-gpu
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-5}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-500}
    volumes:
      - model-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

  # ── Web Frontend (nginx + reverse proxy) ───────────────────────────────
  web-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  model-cache:
    name: whisper-model-cache
