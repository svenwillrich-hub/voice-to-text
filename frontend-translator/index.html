<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/*═══════════════════════════════════════════════════════════════════════════
  RESET & VARIABLES  (shared design system with Voice-to-Text)
═══════════════════════════════════════════════════════════════════════════*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f4f7;--bg-card:#fff;--bg-input:#f7f8fb;--bg-hover:#eef0f4;
  --border:#e0e3ea;--border-l:#cdd1da;
  --text:#1a1e2c;--text-sec:#555b70;--text-dim:#8990a5;
  --accent:#5b4cff;--accent-l:#7b6fff;--accent-bg:rgba(91,76,255,.06);
  --success:#22c55e;--danger:#ef4444;
  --r:14px;--rs:10px;--rxs:7px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);
  --tr:.22s ease;
  --sidebar:320px;
}
html{font-size:16px}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;
  display:flex;flex-direction:column;
}

/*═══════════════════════════════════════════════════════════════════════════
  LAYOUT
═══════════════════════════════════════════════════════════════════════════*/
.layout{display:flex;flex:1;min-height:0}
.main{flex:1;padding:2rem 2.5rem;overflow-y:auto;max-width:900px;margin:0 auto}
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg-card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}

/*═══════════════════════════════════════════════════════════════════════════
  HEADER
═══════════════════════════════════════════════════════════════════════════*/
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:1.55rem;font-weight:700}
.header h1 span{
  background:linear-gradient(135deg,var(--accent),var(--accent-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{color:var(--text-dim);font-size:.82rem;margin-top:.25rem}
.status-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:.6rem;
  padding:.25rem .75rem;border-radius:999px;font-size:.72rem;font-weight:500;
  background:var(--accent-bg);color:var(--accent);border:1px solid rgba(91,76,255,.1);
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
.status-dot.offline{background:var(--danger);animation:none}
.status-dot.loading{background:orange;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/*═══════════════════════════════════════════════════════════════════════════
  TRANSLATION CARD
═══════════════════════════════════════════════════════════════════════════*/
.translate-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);overflow:hidden;margin-bottom:1rem;
}

/* Language selectors row */
.lang-row{
  display:flex;align-items:center;border-bottom:1px solid var(--border);
  background:var(--bg-input);
}
.lang-select-wrap{flex:1;padding:.6rem .8rem}
.lang-select-wrap label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);display:block;margin-bottom:.2rem}
.lang-select{
  width:100%;border:1px solid var(--border);border-radius:var(--rxs);
  padding:.4rem .6rem;font-size:.82rem;font-family:inherit;
  background:var(--bg-card);color:var(--text);cursor:pointer;
  transition:border-color var(--tr);
}
.lang-select:focus{outline:none;border-color:var(--accent)}
.swap-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all var(--tr);
}
.swap-btn:hover{border-color:var(--accent);color:var(--accent);transform:rotate(180deg)}
.swap-btn svg{width:16px;height:16px}

/* Text panels */
.text-panels{display:grid;grid-template-columns:1fr 1fr;min-height:220px}
.text-panel{display:flex;flex-direction:column;padding:0}
.text-panel:first-child{border-right:1px solid var(--border)}
.text-panel textarea{
  flex:1;width:100%;border:none;resize:none;padding:.9rem 1rem;
  font-family:inherit;font-size:.88rem;line-height:1.7;
  background:transparent;color:var(--text);outline:none;min-height:180px;
}
.text-panel textarea::placeholder{color:var(--text-dim)}
.text-panel .result-area{
  flex:1;padding:.9rem 1rem;font-size:.88rem;line-height:1.7;
  color:var(--text);white-space:pre-wrap;overflow-y:auto;min-height:180px;
}
.text-panel .result-area.empty{color:var(--text-dim);font-style:italic}

/* Panel footer */
.panel-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .8rem;border-top:1px solid var(--border);font-size:.68rem;color:var(--text-dim);
  min-height:36px;
}
.char-count{font-variant-numeric:tabular-nums}
.detected-lang{
  display:inline-flex;align-items:center;gap:4px;
  padding:.15rem .45rem;border-radius:var(--rxs);
  background:var(--accent-bg);color:var(--accent);font-size:.68rem;font-weight:500;
}
.copy-btn{
  background:var(--bg-input);border:1px solid var(--border);border-radius:var(--rxs);
  padding:.25rem .45rem;color:var(--text-dim);cursor:pointer;font-size:.68rem;
  display:inline-flex;align-items:center;gap:3px;transition:all var(--tr);
}
.copy-btn:hover{color:var(--text);border-color:var(--border-l)}
.copy-btn.copied{color:var(--success);border-color:var(--success)}

/*═══════════════════════════════════════════════════════════════════════════
  TRANSLATE BUTTON
═══════════════════════════════════════════════════════════════════════════*/
.translate-btn{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  width:100%;padding:.7rem;border:none;border-radius:var(--rs);
  background:linear-gradient(135deg,var(--accent),var(--accent-l));color:#fff;
  font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;
  box-shadow:0 4px 14px rgba(91,76,255,.2);
  transition:transform var(--tr),box-shadow var(--tr),opacity var(--tr);
}
.translate-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,76,255,.3)}
.translate-btn:active{transform:translateY(0)}
.translate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.translate-btn svg{width:18px;height:18px}

/* Loading spinner inside button */
.btn-spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/*═══════════════════════════════════════════════════════════════════════════
  META BAR
═══════════════════════════════════════════════════════════════════════════*/
.meta-bar{
  display:flex;flex-wrap:wrap;gap:.3rem .7rem;font-size:.68rem;color:var(--text-dim);
  margin-top:.5rem;
}
.meta-bar span{display:inline-flex;align-items:center;gap:3px}

/*═══════════════════════════════════════════════════════════════════════════
  SIDEBAR — HISTORY
═══════════════════════════════════════════════════════════════════════════*/
.sidebar-header{
  padding:1rem 1rem .6rem;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
}
.sidebar-header h2{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim)}
.clear-btn{
  background:none;border:1px solid var(--border);border-radius:var(--rxs);
  padding:.25rem .5rem;font-size:.68rem;color:var(--text-dim);cursor:pointer;
  transition:all var(--tr);
}
.clear-btn:hover{color:var(--danger);border-color:var(--danger)}
.history-list{flex:1;overflow-y:auto;padding:.6rem .7rem}
.history-item{
  padding:.6rem .7rem;border:1px solid transparent;border-radius:var(--rs);
  cursor:pointer;transition:all var(--tr);margin-bottom:.35rem;position:relative;
  animation:slideIn .35s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.history-item:hover{background:var(--bg-hover);border-color:var(--border)}
.history-item.active{background:var(--accent-bg);border-color:rgba(91,76,255,.18)}
.history-item .h-name{font-size:.75rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:20px}
.history-item .h-meta{font-size:.65rem;color:var(--text-dim);margin-top:1px}
.history-item .h-preview{font-size:.72rem;color:var(--text-sec);margin-top:.2rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.history-item .h-delete{
  position:absolute;top:.5rem;right:.5rem;background:none;border:none;cursor:pointer;
  color:var(--text-dim);opacity:0;transition:opacity var(--tr),color var(--tr);padding:2px;
}
.history-item:hover .h-delete{opacity:1}
.history-item .h-delete:hover{color:var(--danger)}
.history-item .h-delete svg{width:14px;height:14px}
.history-empty{text-align:center;color:var(--text-dim);font-size:.78rem;padding:2.5rem .5rem}

/*═══════════════════════════════════════════════════════════════════════════
  FOOTER
═══════════════════════════════════════════════════════════════════════════*/
.footer{
  text-align:center;padding:.8rem 1rem;font-size:.68rem;color:var(--text-dim);
  border-top:1px solid var(--border);background:var(--bg-card);
}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

/*═══════════════════════════════════════════════════════════════════════════
  TOAST
═══════════════════════════════════════════════════════════════════════════*/
.toast-container{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
.toast{
  background:#fff;border:1px solid var(--danger);color:var(--danger);
  padding:.6rem .9rem;border-radius:var(--rs);font-size:.78rem;max-width:360px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);animation:slideIn .3s ease;
}
.toast.success{border-color:var(--success);color:var(--success)}

/*═══════════════════════════════════════════════════════════════════════════
  RESPONSIVE
═══════════════════════════════════════════════════════════════════════════*/
@media(max-width:960px){
  .layout{flex-direction:column}
  .sidebar{width:100%;min-width:unset;border-left:none;border-top:1px solid var(--border);max-height:300px}
  .main{padding:1.25rem 1rem;max-width:100%}
}
@media(max-width:640px){
  .text-panels{grid-template-columns:1fr}
  .text-panel:first-child{border-right:none;border-bottom:1px solid var(--border)}
  .text-panel textarea,.text-panel .result-area{min-height:140px}
}
</style>
</head>
<body>

<div class="layout">
  <div class="main">
    <header class="header">
      <h1><span>Text Translator</span></h1>
      <p>Local LLM-powered translation &middot; No data leaves your server &middot; Fully offline</p>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting &hellip;</span>
      </div>
    </header>

    <!-- Translation Card -->
    <div class="translate-card">
      <!-- Language Row -->
      <div class="lang-row">
        <div class="lang-select-wrap">
          <label for="srcLang">Source</label>
          <select class="lang-select" id="srcLang">
            <option value="auto" selected>Auto-detect</option>
          </select>
        </div>
        <button class="swap-btn" id="swapBtn" title="Swap languages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4m0 0l4-4m-4 4h18"/><path d="M17 8l4 4m0 0l-4 4m4-4H3" opacity=".4"/></svg>
        </button>
        <div class="lang-select-wrap">
          <label for="tgtLang">Target</label>
          <select class="lang-select" id="tgtLang"></select>
        </div>
      </div>

      <!-- Text Panels -->
      <div class="text-panels">
        <div class="text-panel">
          <textarea id="srcText" placeholder="Type or paste text to translate &hellip;" spellcheck="false"></textarea>
          <div class="panel-footer">
            <span class="char-count" id="charCount">0 / 10,000</span>
            <span class="detected-lang" id="detectedLang" style="display:none"></span>
          </div>
        </div>
        <div class="text-panel">
          <div class="result-area empty" id="tgtResult">Translation will appear here</div>
          <div class="panel-footer">
            <span id="resultMeta"></span>
            <button class="copy-btn" id="copyBtn" style="display:none">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <span class="copy-label">Copy</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Translate Button -->
    <button class="translate-btn" id="translateBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l4 4-4 4"/><line x1="12" y1="4" x2="12" y2="20" opacity=".3"/><path d="M15 4h2a2 2 0 0 1 2 2v1"/><path d="M15 20h2a2 2 0 0 0 2-2v-1"/></svg>
      Translate
    </button>

    <!-- Meta bar -->
    <div class="meta-bar" id="metaBar"></div>
  </div>

  <!-- Sidebar — History -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>History</h2>
      <button class="clear-btn" id="clearAllBtn" title="Delete all">Clear all</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">No translations yet.</div>
    </div>
  </aside>
</div>

<footer class="footer">
  Provided by <strong>Dr. Sven-Erik Willrich</strong> &middot; <a href="mailto:mail@svenwillrich.de">mail@svenwillrich.de</a>
</footer>

<div class="toast-container" id="toasts"></div>

<script>
/*═══════════════════════════════════════════════════════════════════════════
  Text Translator — Frontend
═══════════════════════════════════════════════════════════════════════════*/
const API_BASE=(()=>{const p=location.port;if(p===''||p==='80'||p==='1235')return'/api';return'http://localhost:5000'})();
const MAX_CHARS=10000;

// ── State ───────────────────────────────────────────────────────────────
let hist=[];
let activeIdx=-1;
let languages=[];
let isTranslating=false;
let detectTimer=null;
let lastTranslatedText='';

// ── DOM ─────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const $srcLang=$('srcLang'),$tgtLang=$('tgtLang'),$srcText=$('srcText'),
  $tgtResult=$('tgtResult'),$translateBtn=$('translateBtn'),
  $charCount=$('charCount'),$detectedLang=$('detectedLang'),
  $copyBtn=$('copyBtn'),$metaBar=$('metaBar'),$swapBtn=$('swapBtn'),
  $statusDot=$('statusDot'),$statusText=$('statusText'),
  $historyList=$('historyList'),$historyEmpty=$('historyEmpty'),
  $clearAllBtn=$('clearAllBtn'),$toasts=$('toasts'),$resultMeta=$('resultMeta');

// ── Health check ────────────────────────────────────────────────────────
async function checkHealth(){
  try{
    const r=await fetch(`${API_BASE}/health`,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw 0;const d=await r.json();
    if(d.status==='ok'){
      $statusDot.className='status-dot';
      $statusText.textContent=`${d.translation_model} · Ollama · Ready`;
    }else{
      $statusDot.className='status-dot loading';
      let msg='Loading models';
      if(!d.translation_model_ready)msg+=` · Pulling ${d.translation_model}`;
      $statusText.textContent=msg+' …';
    }
  }catch{$statusDot.className='status-dot offline';$statusText.textContent='Server unreachable'}
}
checkHealth();setInterval(checkHealth,10000);

// ── Toast ───────────────────────────────────────────────────────────────
function toast(msg,type='error'){
  const el=document.createElement('div');el.className=`toast${type==='success'?' success':''}`;
  el.textContent=msg;$toasts.appendChild(el);setTimeout(()=>el.remove(),5000);
}

// ── Load languages ──────────────────────────────────────────────────────
async function loadLanguages(){
  try{
    const r=await fetch(`${API_BASE}/languages`);
    if(!r.ok)return;
    const d=await r.json();languages=d.languages;
    const srcOpts=languages.map(l=>`<option value="${l.code}">${l.name}</option>`).join('');
    const tgtOpts=srcOpts;
    $srcLang.innerHTML=`<option value="auto" selected>Auto-detect</option>`+srcOpts;
    $tgtLang.innerHTML=tgtOpts;
    // Default target: English
    $tgtLang.value='en';
  }catch{}
}
loadLanguages();

// ── Char count + auto-detect ────────────────────────────────────────────
$srcText.addEventListener('input',()=>{
  const len=$srcText.value.length;
  $charCount.textContent=`${len.toLocaleString()} / ${MAX_CHARS.toLocaleString()}`;
  $translateBtn.disabled=len===0||isTranslating;

  // Debounced language detection
  clearTimeout(detectTimer);
  if(len>10){
    detectTimer=setTimeout(()=>detectLanguage($srcText.value),500);
  }else{
    $detectedLang.style.display='none';
  }
});

async function detectLanguage(text){
  if($srcLang.value!=='auto')return;
  try{
    const r=await fetch(`${API_BASE}/detect`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text.slice(0,500)})
    });
    if(!r.ok)return;
    const d=await r.json();
    if(d.language_code!=='unknown'){
      $detectedLang.textContent=d.language_name;
      $detectedLang.style.display='';
    }
  }catch{}
}

// ── Swap languages ──────────────────────────────────────────────────────
$swapBtn.addEventListener('click',()=>{
  const src=$srcLang.value;
  const tgt=$tgtLang.value;
  if(src==='auto')return; // can't swap auto-detect

  $srcLang.value=tgt;
  $tgtLang.value=src;

  // Also swap text if there's a translation
  if(lastTranslatedText){
    const oldSrc=$srcText.value;
    $srcText.value=lastTranslatedText;
    $tgtResult.textContent=oldSrc;
    $tgtResult.className='result-area';
    lastTranslatedText=oldSrc;
    $srcText.dispatchEvent(new Event('input'));
  }
});

// ── Translate ───────────────────────────────────────────────────────────
$translateBtn.addEventListener('click',doTranslate);
$srcText.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='Enter')doTranslate();
});

async function doTranslate(){
  const text=$srcText.value.trim();
  if(!text||isTranslating)return;

  isTranslating=true;
  $translateBtn.disabled=true;
  $translateBtn.innerHTML='<span class="btn-spinner"></span> Translating …';
  $tgtResult.textContent='';
  $tgtResult.className='result-area empty';
  $copyBtn.style.display='none';
  $metaBar.innerHTML='';
  $resultMeta.textContent='';

  try{
    const body={
      text,
      target_language:$tgtLang.value,
    };
    if($srcLang.value!=='auto')body.source_language=$srcLang.value;

    const r=await fetch(`${API_BASE}/translate`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok){
      let msg=`HTTP ${r.status}`;
      try{const j=await r.json();msg=j.detail||msg}catch{}
      throw new Error(msg);
    }
    const d=await r.json();
    lastTranslatedText=d.translated_text;

    $tgtResult.textContent=d.translated_text;
    $tgtResult.className='result-area';
    $copyBtn.style.display='';
    $resultMeta.textContent=`${d.duration_processing}s`;

    $metaBar.innerHTML=[
      `<span>Source: ${d.source_language_name} (${d.source_language})</span>`,
      `<span>Target: ${d.target_language_name}</span>`,
      `<span>Processing: ${d.duration_processing}s</span>`,
    ].join('');

    // Add to history
    hist.unshift({
      srcText:text.slice(0,200),
      tgtText:d.translated_text.slice(0,200),
      srcLang:d.source_language_name,
      tgtLang:d.target_language_name,
      srcLangCode:d.source_language,
      tgtLangCode:d.target_language,
      time:d.duration_processing,
      fullSrc:text,
      fullTgt:d.translated_text,
    });
    activeIdx=0;
    renderHistory();
  }catch(e){
    toast(`Translation error: ${e.message}`);
  }finally{
    isTranslating=false;
    $translateBtn.disabled=$srcText.value.length===0;
    $translateBtn.innerHTML=`
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l4 4-4 4"/><line x1="12" y1="4" x2="12" y2="20" opacity=".3"/><path d="M15 4h2a2 2 0 0 1 2 2v1"/><path d="M15 20h2a2 2 0 0 0 2-2v-1"/></svg>
      Translate`;
  }
}

// ── Copy ────────────────────────────────────────────────────────────────
$copyBtn.addEventListener('click',()=>{
  navigator.clipboard.writeText(lastTranslatedText).then(()=>{
    const l=$copyBtn.querySelector('.copy-label');
    $copyBtn.classList.add('copied');l.textContent='Copied!';
    setTimeout(()=>{$copyBtn.classList.remove('copied');l.textContent='Copy'},1500);
  });
});

// ── History ─────────────────────────────────────────────────────────────
function renderHistory(){
  if(!hist.length){$historyEmpty.style.display='';$historyList.innerHTML='';$historyList.appendChild($historyEmpty);return}
  $historyEmpty.style.display='none';
  $historyList.innerHTML=hist.map((h,i)=>`
    <div class="history-item${i===activeIdx?' active':''}" onclick="selectHistory(${i})">
      <button class="h-delete" onclick="event.stopPropagation();deleteHistory(${i})" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="h-name">${esc(h.srcLang)} → ${esc(h.tgtLang)}</div>
      <div class="h-meta">${h.time}s</div>
      <div class="h-preview">${esc(h.srcText)}</div>
    </div>
  `).join('');
}

function selectHistory(idx){
  activeIdx=idx;const h=hist[idx];
  $srcText.value=h.fullSrc;
  $tgtResult.textContent=h.fullTgt;
  $tgtResult.className='result-area';
  lastTranslatedText=h.fullTgt;
  $copyBtn.style.display='';
  if(h.srcLangCode)$srcLang.value=h.srcLangCode;
  if(h.tgtLangCode)$tgtLang.value=h.tgtLangCode;
  $srcText.dispatchEvent(new Event('input'));
  $metaBar.innerHTML=[
    `<span>Source: ${h.srcLang}</span>`,
    `<span>Target: ${h.tgtLang}</span>`,
    `<span>Processing: ${h.time}s</span>`,
  ].join('');
  renderHistory();
}

function deleteHistory(idx){
  hist.splice(idx,1);
  if(activeIdx===idx){activeIdx=-1}
  else if(activeIdx>idx){activeIdx--}
  renderHistory();
}

$clearAllBtn.addEventListener('click',()=>{
  if(!hist.length)return;
  hist=[];activeIdx=-1;renderHistory();
  toast('History cleared','success');
});

// ── Utilities ───────────────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
